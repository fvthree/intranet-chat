services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: intranet_chat
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      # Host 5433 avoids clashing with a local PostgreSQL install on 5432 (common on dev machines).
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d intranet_chat"]
      interval: 3s
      timeout: 5s
      retries: 10
      start_period: 5s
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres_data:
